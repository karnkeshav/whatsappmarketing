name: Discovery scan

on:
  schedule:
    - cron: '0 3 * * *'          # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated regions (default: all)'
        required: false
        default: 'Hyderabad,Bihar,Delhi,Jharkhand'
      category:
        description: 'Category keyword'
        required: false
        default: 'jobs'
      max_per_region:
        description: 'Max new groups per region'
        required: false
        default: '12'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run discovery
        run: |
          python scripts/discover.py \
            --regions "${{ github.event.inputs.regions || 'Hyderabad,Bihar,Delhi,Jharkhand' }}" \
            --category "${{ github.event.inputs.category || 'jobs' }}" \
            --max-per-region "${{ github.event.inputs.max_per_region || '12' }}"

      - name: Commit data updates
        run: |
          git config user.name  "wa-jobs-bot"
          git config user.email "wa-jobs-bot@users.noreply.github.com"
          git add docs/data/groups.json docs/data/scan_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): discovery scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
