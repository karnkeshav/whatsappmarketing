name: Apply issue reports

on:
  issues:
    types: [opened, labeled, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    # Only run when the issue carries 'submit' or 'report' labels (or for manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'submit') ||
      contains(github.event.issue.labels.*.name, 'report')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Apply pending submits / reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/apply_reports.py

      - name: Commit data updates
        run: |
          git config user.name  "wa-jobs-bot"
          git config user.email "wa-jobs-bot@users.noreply.github.com"
          git add docs/data/groups.json
          if git diff --staged --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): apply user issues $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
