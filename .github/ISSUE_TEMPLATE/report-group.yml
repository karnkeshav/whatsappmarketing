name: Report a group
description: Tell us whether a listed group worked, needed approval, was read-only, or invalid
title: "[report:<kind>] <group name>"
labels: ["report"]
body:
  - type: markdown
    attributes:
      value: |
        Issues opened via the site's "Did it work?" buttons land here.

  - type: input
    id: group_id
    attributes:
      label: Group ID
      description: Auto-filled when opened from the site (UUID).
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind of report
      options:
        - works         # I joined without admin approval
        - approval      # Needed admin approval to join
        - readonly      # Only admins can send messages
        - invalid       # Invite link expired / invalid
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
